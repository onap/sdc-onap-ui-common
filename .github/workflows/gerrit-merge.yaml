# SPDX-FileCopyrightText: 2026 The Linux Foundation

name: Gerrit Merge

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      GERRIT_BRANCH:
        description: "Branch that change is against"
        required: true
        type: string
      GERRIT_CHANGE_ID:
        description: "The ID for the change"
        required: true
        type: string
      GERRIT_CHANGE_NUMBER:
        description: "The Gerrit number"
        required: true
        type: string
      GERRIT_CHANGE_URL:
        description: "URL to the change"
        required: true
        type: string
      GERRIT_EVENT_TYPE:
        description: "Type of Gerrit event"
        required: true
        type: string
      GERRIT_PATCHSET_NUMBER:
        description: "The patch number for the change"
        required: true
        type: string
      GERRIT_PATCHSET_REVISION:
        description: "The revision sha"
        required: true
        type: string
      GERRIT_PROJECT:
        description: "Project in Gerrit"
        required: true
        type: string
      GERRIT_REFSPEC:
        description: "Gerrit refspec of change"
        required: true
        type: string

concurrency:
  # yamllint disable-line rule:line-length
  group: gerrit-merge-${{ github.workflow }}-${{ github.event.inputs.GERRIT_CHANGE_ID || github.run_id }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Notify job start
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a5de1d5bf17c2603ae81544dc2a455017b454ec8 # v1.1.1
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: clear
          comment-only: "true"
      - name: Allow replication
        run: sleep 10s

  npm-snapshot:
    needs: [notify]
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.GERRIT_PATCHSET_REVISION }}
      - name: Read version from version.properties
        id: version
        run: |
          source version.properties
          SNAPSHOT_VERSION="${major}.${minor}.${patch}-SNAPSHOT"
          echo "snapshot_version=$SNAPSHOT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Snapshot version: $SNAPSHOT_VERSION"
      # yamllint disable-line rule:line-length
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "18"
      - name: Build
        run: |
          npm install
          npm run build
      - name: Publish snapshot to Nexus
        run: |
          VERSION="${{ steps.version.outputs.snapshot_version }}"
          npm version "$VERSION" --no-git-tag-version
          printf 'registry=https://nexus3.onap.org/repository/npm.snapshot/\n' > .npmrc
          printf '_auth=%s\n' "$NPM_NEXUS_AUTH" >> .npmrc
          printf 'always-auth=true\n' >> .npmrc
          npm publish
        env:
          NPM_NEXUS_AUTH: ${{ secrets.NPM_NEXUS_AUTH }}

  npm-release:
    needs: [notify]
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.GERRIT_PATCHSET_REVISION }}
          fetch-depth: 2
      - name: Check for release file
        id: check-release
        run: |
          RELEASE_FILE=$(git diff-tree --no-commit-id -r HEAD \
            --name-only -- "releases/" | head -1)
          if [ -z "$RELEASE_FILE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No release file in this change, skipping release"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "release_file=$RELEASE_FILE" >> "$GITHUB_OUTPUT"
            VERSION=$(grep '^version:' "$RELEASE_FILE" \
              | awk '{print $2}' | tr -d "'\"\r")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Detected release version: $VERSION"
          fi
      # yamllint disable-line rule:line-length
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.check-release.outputs.skip == 'false'
        with:
          node-version: "18"
      - name: Build
        if: steps.check-release.outputs.skip == 'false'
        run: |
          npm install
          npm run build
      - name: Publish release to Nexus
        if: steps.check-release.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.check-release.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version
          printf 'registry=https://nexus3.onap.org/repository/npm.public/\n' > .npmrc
          printf '_auth=%s\n' "$NPM_NEXUS_AUTH" >> .npmrc
          printf 'always-auth=true\n' >> .npmrc
          npm publish
        env:
          NPM_NEXUS_AUTH: ${{ secrets.NPM_NEXUS_AUTH }}

  report-status:
    if: ${{ always() }}
    needs: [notify, npm-snapshot, npm-release]
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Get workflow conclusion
        uses: im-open/workflow-conclusion@7b146947e59eaf7fc3328822357861ab1758c088 # v2.2.5
      - name: Report workflow conclusion
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a5de1d5bf17c2603ae81544dc2a455017b454ec8 # v1.1.1
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: ${{ env.WORKFLOW_CONCLUSION }}
          comment-only: "true"
